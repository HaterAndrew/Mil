name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          REQ=requirements-lock.txt
          [ -f "$REQ" ] || REQ=requirements.txt
          pip install -r "$REQ" pytest-cov
      - run: python3 -m pytest tests/ -v --cov=apps --cov=scripts --cov=sitrep_tracker --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check apps/ scripts/ sitrep_tracker/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      - run: bandit -r apps/ scripts/ sitrep_tracker/ -ll
      - run: pip-audit -r requirements-lock.txt

  alembic-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          REQ=requirements-lock.txt
          [ -f "$REQ" ] || REQ=requirements.txt
          pip install -r "$REQ" alembic
      - name: Check alembic migrations
        run: |
          for app in mtt_scheduler enrollment_manager instructor_manager lessons_learned \
                    training_metrics curriculum_tracker offline_packager sharepoint_sync \
                    xref_validator progress_tracker glossary_search aar_aggregator data_quality; do
            echo "--- Checking $app ---"
            APP=$app python3 -m alembic check || exit 1
          done

  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check_html_react_sync.py

  platform-update-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check for Palantir platform updates
        run: python3 scripts/check_platform_updates.py
