name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Run sitrep_tracker tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python3 -m pytest tests/ -v

  build-pdfs:
    name: Build PDFs (on push to main/master only)
    runs-on: ubuntu-latest
    # Only run on direct push, not on PRs, to avoid committing PDFs to forks
    if: github.event_name == 'push'
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so we can commit updated PDFs back
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Build PDFs
        run: python3 scripts/build_pdfs.py

      - name: Commit updated PDFs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maven_training/pdf/
          # Only commit if there are changes to PDFs
          git diff --cached --quiet || git commit -m "Auto-rebuild PDFs [skip ci]"
          git push
