<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Viewer — MSS Training Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #2a2a2a; font-family: Arial, sans-serif; overflow: hidden; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 100;
      background: #0C2340; color: #fff; display: flex; align-items: center;
      padding: 0 16px; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #toolbar .title { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #toolbar button {
      background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 6px 14px;
      border-radius: 3px; cursor: pointer; font-size: 13px;
    }
    #toolbar button:hover { background: rgba(255,255,255,0.25); }
    #toolbar .page-info { font-size: 13px; min-width: 80px; text-align: center; }
    #viewer { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; overflow: auto; text-align: center; padding: 8px 0; }
    canvas { display: block; margin: 4px auto; box-shadow: 0 2px 12px rgba(0,0,0,0.5); }
    #loading { color: #C8971A; font-size: 18px; margin-top: 40vh; }
    #error { color: #ff6b6b; font-size: 16px; margin-top: 40vh; padding: 20px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button onclick="history.back()">&larr; Back</button>
    <span class="title" id="docTitle">Loading...</span>
    <button onclick="zoomOut()">-</button>
    <span class="page-info" id="zoomLevel">100%</span>
    <button onclick="zoomIn()">+</button>
    <button onclick="fitWidth()">Fit Width</button>
    <button onclick="downloadPdf()" id="dlBtn" style="background:rgba(200,151,26,0.4);">&#11123; Download</button>
  </div>
  <div id="viewer">
    <div id="loading">Loading document...</div>
  </div>

  <script type="module">
    import * as pdfjsLib from './pdf.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';

    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const viewer = document.getElementById('viewer');
    const docTitle = document.getElementById('docTitle');
    const zoomDisplay = document.getElementById('zoomLevel');

    if (!file) {
      viewer.innerHTML = '<div id="error">No document specified.</div>';
    } else {
      docTitle.textContent = decodeURIComponent(file.split('/').pop());
      let currentScale = 1.5;
      let pdfDoc = null;

      window.zoomIn = () => { currentScale = Math.min(currentScale + 0.25, 4); renderAll(); };
      window.zoomOut = () => { currentScale = Math.max(currentScale - 0.25, 0.5); renderAll(); };
      window.fitWidth = () => {
        if (!pdfDoc) return;
        pdfDoc.getPage(1).then(page => {
          const viewport = page.getViewport({ scale: 1 });
          currentScale = (window.innerWidth - 40) / viewport.width;
          renderAll();
        });
      };

      function renderAll() {
        zoomDisplay.textContent = Math.round(currentScale / 1.5 * 100) + '%';
        viewer.innerHTML = '';
        for (let i = 1; i <= pdfDoc.numPages; i++) {
          renderPage(i);
        }
      }

      function renderPage(num) {
        pdfDoc.getPage(num).then(page => {
          const viewport = page.getViewport({ scale: currentScale });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          viewer.appendChild(canvas);
          page.render({ canvasContext: canvas.getContext('2d'), viewport });
        });
      }

      let pdfBytes = null;
      const pdfUrl = new URL('../' + file, window.location.href).href;

      // Fetch raw bytes for download, then load into PDF.js
      fetch(pdfUrl).then(r => r.arrayBuffer()).then(buf => {
        pdfBytes = buf;
        return pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
      }).then(pdf => {
        pdfDoc = pdf;
        renderAll();
        window.fitWidth();
      }).catch(err => {
        viewer.innerHTML = '<div id="error">Failed to load document: ' + err.message + '</div>';
      });

      window.downloadPdf = () => {
        if (!pdfBytes) return;
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = decodeURIComponent(file.split('/').pop());
        a.click();
        URL.revokeObjectURL(url);
      };
    }
  </script>
</body>
</html>
