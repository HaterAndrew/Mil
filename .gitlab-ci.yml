stages:
  - test
  - deploy

test:
  stage: test
  image: python:3.12-slim
  script:
    - REQ=requirements-lock.txt; [ -f "$REQ" ] || REQ=requirements.txt; pip install -r "$REQ" pytest-cov
    - python3 -m pytest tests/ -v --cov=apps --cov=scripts --cov=sitrep_tracker --cov-report=term-missing
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

lint:
  stage: test
  image: python:3.12-slim
  script:
    - pip install ruff
    - ruff check apps/ scripts/ sitrep_tracker/ tests/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

security:
  stage: test
  image: python:3.12-slim
  script:
    - pip install bandit pip-audit
    - bandit -r apps/ scripts/ sitrep_tracker/ -ll
    - pip-audit -r requirements-lock.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

alembic-check:
  stage: test
  image: python:3.12-slim
  script:
    - REQ=requirements-lock.txt; [ -f "$REQ" ] || REQ=requirements.txt; pip install -r "$REQ" alembic
    - |
      for app in mtt_scheduler enrollment_manager instructor_manager lessons_learned \
                 training_metrics curriculum_tracker offline_packager sharepoint_sync \
                 xref_validator progress_tracker glossary_search aar_aggregator data_quality; do
        echo "--- Checking $app ---"
        APP=$app python3 -m alembic check || exit 1
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

sync-check:
  stage: test
  image: python:3.12-slim
  script:
    - python3 scripts/check_html_react_sync.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

pages:
  stage: deploy
  needs: ["test"]
  script:
    - mkdir -p public
    - cp maven_training/mss_info_app/index.html public/index.html
    - cp maven_training/mss_info_app/training_schedule.html public/training_schedule.html
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
