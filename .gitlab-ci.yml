stages:
  - test
  - deploy

test:
  stage: test
  image: python:3.12-slim
  script:
    - pip install -r requirements.txt
    - python3 -m pytest tests/ -v
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

pages:
  stage: deploy
  needs: ["test"]
  script:
    - mkdir -p public
    - cp maven_training/mss_info_app/index.html public/index.html
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
